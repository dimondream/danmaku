<!DOCTYPE html>
<html>
<head>
  <title>Danmaku Sender</title>
</head>
<body>
  <form id="sendForm">
  <input type="text" id="message" name="message">



  <button>send message

    
  </button>
</form>
  <script>
    const form = document.getElementById("sendForm");
    form.addEventListener('submit', function(event) {
    // 1. Stop the browser from reloading the page
    event.preventDefault();
    inputCollect();
    // 2. Custom logic (e.g., read inputs, send AJAX/Fetch request)
    console.log("Form submission intercepted!");
  });
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const room = urlParams.get('room')||"landing";
    const socket = new WebSocket(`ws://${window.location.host}/?room=${room}`);
    
    function inputCollect(){
      const inputData = document.getElementById("message").value;
      document.getElementById("message").value =''
      const messageJson = {
        type: 'danmaku',
        text: inputData,
        size: 'medium',         // 之後可以給 user 選
        color: 'white'          // 之後可以給 user 選
      }

      socket.send(JSON.stringify(messageJson));    
    }
    
    socket.addEventListener('open',()=>{
      console.log(`connection established`);
      
      }
    )
    socket.addEventListener('message',(event)=>{

      
        console.log(event.data);
      })
    socket.addEventListener('close', () => {  });
    socket.addEventListener('error', (err) => { err });
  </script>
</body>
</html>
